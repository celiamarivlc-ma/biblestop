<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLE STOP: ARCADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --p1: #ff00ff; --p2: #00ffff; --neon: #33ff00; --bg: #000; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', cursive; background: var(--bg); color: var(--neon);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        
        /* Scanlines y efecto CRT */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        #setup-screen, #victory-screen {
            position: absolute; width: 100%; height: 100%; z-index: 500;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg); text-align: center;
        }

        .btn-arcade {
            font-family: 'Press Start 2P'; padding: 20px; margin: 10px; border: 4px solid;
            background: transparent; color: inherit; cursor: pointer; font-size: 0.7rem;
            box-shadow: 4px 4px 0px; transition: 0.1s;
        }
        .btn-arcade:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px; }

        #fs-btn { position: absolute; top: 10px; right: 10px; z-index: 1100; border: 2px solid; padding: 5px; font-size: 0.5rem; background: #000; color: #fff; cursor: pointer; }

        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 2px solid rgba(51, 255, 0, 0.2); }
        #p2-zone { transform: rotate(180deg); color: var(--p2); }
        #p1-zone { color: var(--p1); }

        #central-display { 
            background: #000; border: 4px double var(--neon); padding: 10px; z-index: 100;
            text-align: center; box-shadow: 0 0 15px var(--neon);
        }
        #letra-res { font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px var(--neon); }
        #tema-res { font-size: 0.6rem; margin-top: 8px; }

        .input-ans {
            background: #000; border: 3px solid currentColor; color: #fff;
            padding: 10px; font-family: 'Press Start 2P'; width: 80%; text-align: center; margin-bottom: 10px;
        }

        /* Barra de tiempo */
        .timer-container { width: 80%; height: 10px; border: 2px solid currentColor; margin-top: 10px; position: relative; }
        .timer-bar { width: 100%; height: 100%; background: currentColor; transition: width 1s linear; }

        .score { position: absolute; font-size: 0.6rem; padding: 10px; }
        #score-p1 { bottom: 10px; right: 10px; }
        #score-p2 { top: 10px; left: 10px; transform: rotate(180deg); }

        .hidden { display: none !important; }
        .pixel { position: fixed; width: 8px; height: 8px; pointer-events: none; }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFS()">[ FULLSCREEN ]</button>
    <div id="score-p2" class="score hidden">SCORE: 0</div>
    <div id="score-p1" class="score hidden">SCORE: 0</div>

    <div id="setup-screen">
        <h1 style="font-size: 1.8rem; margin-bottom: 30px;">BIBLE<br><span style="color:white">STOP</span></h1>
        <button class="btn-arcade" style="color: var(--p2);" onclick="startGame('duelo')">PLAYER 1 VS 2 [START DUEL]</button>
        <button class="btn-arcade" style="color: var(--p1);" onclick="startGame('solo')">SOLO MISSION</button>
    </div>

    <div id="game-screen" style="display:none; flex-direction: column; height: 100%;">
        <div id="p2-zone" class="player-zone">
            <button id="btn-p2" class="btn-arcade" onclick="claim('p2')">STOP!</button>
            <div id="input-p2" class="hidden">
                <input type="text" class="input-ans" id="ans-p2" placeholder="WRITING...">
                <div class="timer-container"><div id="bar-p2" class="timer-bar"></div></div>
                <button class="btn-arcade" onclick="submit('p2')">OK</button>
            </div>
        </div>

        <div id="central-display">
            <span id="letra-res">?</span>
            <span id="tema-res">READY?</span>
        </div>

        <div id="p1-zone" class="player-zone">
            <button id="btn-p1" class="btn-arcade" onclick="claim('p1')">STOP!</button>
            <div id="input-p1" class="hidden">
                <input type="text" class="input-ans" id="ans-p1" placeholder="WRITING...">
                <div class="timer-container"><div id="bar-p1" class="timer-bar"></div></div>
                <button class="btn-arcade" onclick="submit('p1')">OK</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 id="winner-text">MISSION COMPLETE</h1>
        <button class="btn-arcade" onclick="location.reload()">NEW GAME</button>
    </div>

    <script>
        const letrasBase = "ABCDEFGHJLMNOPRSTUV".split("");
        const temasBase = ["PERSONAJE", "LUGAR", "SUCESO", "ALIMENTO", "LIBRO", "OBJETO"];
        let letrasMazo = [], temasMazo = [], timerObj = null;
        let scoreP1 = 0, scoreP2 = 0, letraActual = "", timeLeft = 10, currentPlayer = null, modoActual = '';

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function getNext(tipo) {
            if (tipo === 'letra') {
                if (!letrasMazo.length) letrasMazo = shuffle([...letrasBase]);
                return letrasMazo.pop();
            } else {
                if (!temasMazo.length) temasMazo = shuffle([...temasBase]);
                return temasMazo.pop();
            }
        }

        function startGame(mode) {
            modoActual = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('score-p1').classList.remove('hidden');
            if(mode === 'solo') document.getElementById('p2-zone').classList.add('hidden');
            else document.getElementById('score-p2').classList.remove('hidden');
            spin();
        }

        function spin() {
            clearInterval(timerObj);
            currentPlayer = null;
            resetUI();
            const display = document.getElementById('central-display');
            let count = 0;
            const interval = setInterval(() => {
                document.getElementById('letra-res').innerText = letrasBase[Math.floor(Math.random()*letrasBase.length)];
                document.getElementById('tema-res').innerText = "SCANNING...";
                if(count++ > 12) {
                    clearInterval(interval);
                    letraActual = getNext('letra');
                    document.getElementById('letra-res').innerText = letraActual;
                    document.getElementById('tema-res').innerText = "CATEGORY: " + getNext('tema');
                }
            }, 80);
        }

        function claim(p) {
            if(currentPlayer) return;
            currentPlayer = p;
            document.getElementById(`btn-${p}`).classList.add('hidden');
            document.getElementById(`input-${p}`).classList.remove('hidden');
            const input = document.getElementById(`ans-${p}`);
            input.focus();
            
            timeLeft = 10;
            const bar = document.getElementById(`bar-${p}`);
            bar.style.width = '100%';
            
            timerObj = setInterval(() => {
                timeLeft--;
                bar.style.width = (timeLeft * 10) + '%';
                if(timeLeft <= 0) {
                    alert("TIME OUT! FAIL!");
                    spin();
                }
            }, 1000);
        }

        function submit(p) {
            const val = document.getElementById(`ans-${p}`).value.trim().toUpperCase();
            if (val.startsWith(letraActual) && val.length > 2) {
                if(p === 'p1') scoreP1 += 5; else scoreP2 += 5;
                updateScores();
                if(scoreP1 >= 25 || scoreP2 >= 25) showVictory(p);
                else spin();
            } else {
                alert("INVALID! MUST START WITH " + letraActual);
            }
        }

        function updateScores() {
            document.getElementById('score-p1').innerText = "SCORE: " + scoreP1;
            document.getElementById('score-p2').innerText = "SCORE: " + scoreP2;
        }

        function resetUI() {
            document.querySelectorAll('.btn-arcade').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.player-zone div').forEach(d => { if(d.id.includes('input')) d.classList.add('hidden')});
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function showVictory(p) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            document.getElementById('winner-text').innerText = modoActual === 'solo' ? "MISSION ACCOMPLISHED" : "PLAYER " + (p==='p1'?'1':'2') + " WINS";
            celebrate();
        }

        function celebrate() {
            for(let i=0; i<60; i++) {
                const p = document.createElement('div');
                p.className = 'pixel';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.backgroundColor = ['#f0f', '#0ff', '#33ff00'][Math.floor(Math.random()*3)];
                document.body.appendChild(p);
                p.animate([{ top: '-10px' }, { top: '110vh' }], { duration: 1000 + Math.random()*2000, iterations: Infinity });
            }
        }
    </script>
</body>
</html>
