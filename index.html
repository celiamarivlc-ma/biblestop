<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblia Stop</title>
    <style>
        :root { --bg: #0f172a; --p1: #f43f5e; --p2: #0ea5e9; --accent: #70e000; --white: #ffffff; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg);
            color: var(--white); margin: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        .score { position: absolute; font-size: 2.2rem; font-weight: 800; padding: 10px; z-index: 20; }
        #score-p1 { bottom: 10px; right: 20px; color: var(--p1); }
        #score-p2 { top: 10px; left: 20px; color: var(--p2); transform: rotate(180deg); }
        
        #setup-screen, #victory-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; text-align: center; padding: 20px; }
        #game-screen { display: none; flex-direction: column; height: 100%; position: relative; }
        
        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: background 0.3s; width: 100%; }
        #p2-zone { transform: rotate(180deg); border-bottom: 2px solid rgba(255,255,255,0.1); }
        
        /* Ajuste para modo solitario: la zona ocupa toda la pantalla */
        .solo-active { flex: 1; height: 100%; }

        .zone-active { background: rgba(112, 224, 0, 0.15) !important; }
        .zone-disabled { opacity: 0.15; pointer-events: none; }

        #central-display { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--bg); border: 3px solid var(--accent); padding: 20px; 
            border-radius: 24px; z-index: 10; text-align: center; min-width: 200px;
            pointer-events: none; /* Para que no bloquee los clics en los botones de atrás */
        }
        #letra-res { color: var(--accent); font-size: 5rem; display: block; line-height: 1; font-weight: 900; }
        #tema-res { font-size: 0.9rem; display: block; font-weight: bold; margin-top: 10px; letter-spacing: 2px; color: #94a3b8; }
        #timer-bar { position: absolute; left: 0; width: 0%; height: 6px; background: var(--accent); bottom: 0; }

        .btn-action { padding: 16px 32px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; z-index: 5; }
        .btn-rebote { background: #fbbf24 !important; color: #000 !important; }
        
        .input-ans { padding: 14px; border-radius: 12px; border: 2px solid var(--accent); margin-top: 12px; width: 85%; text-align: center; font-size: 1.3rem; background: #1e293b; color: white; outline: none; }
        
        #fs-btn { position: absolute; top: 15px; right: 15px; font-size: 1.2rem; background: rgba(255,255,255,0.1); border: none; cursor: pointer; z-index: 100; border-radius: 50%; width: 40px; height: 40px; color: white; display: flex; align-items: center; justify-content: center; }
        
        .hidden { display: none !important; }
        .spinning { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(-50%, -50.5%); } 50% { transform: translate(-50%, -49.5%); } }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFS()">⛶</button>
    
    <div id="score-p2" class="score hidden">0</div>
    <div id="score-p1" class="score hidden">0</div>

    <div id="setup-screen">
        <h1 style="color: var(--accent); font-size: 3rem; margin: 0;">BIBLIA<br>STOP</h1>
        <button class="btn-action" style="background: var(--p1); color: white; width: 220px;" onclick="startGame('duelo')">Duelo 1 vs 1</button>
        <button class="btn-action" style="background: var(--p2); color: white; width: 220px;" onclick="startGame('solo')">Modo Solitario</button>
    </div>

    <div id="game-screen">
        <div id="p2-zone" class="player-zone">
            <button id="btn-p2" class="btn-action" style="background: var(--p2); color: white;" onclick="claim('p2')">¡STOP!</button>
            <div id="input-p2" class="hidden">
                <input type="text" class="input-ans" placeholder="Respuesta..." id="ans-p2" autocomplete="off">
                <button class="btn-action" style="background: var(--accent); margin-top:10px" onclick="submit('p2')">LISTO</button>
            </div>
        </div>

        <div id="central-display">
            <span id="letra-res">?</span>
            <span id="tema-res">INICIANDO...</span>
            <div id="timer-bar"></div>
        </div>

        <div id="p1-zone" class="player-zone">
            <button id="btn-p1" class="btn-action" style="background: var(--p1); color: white;" onclick="claim('p1')">¡STOP!</button>
            <div id="input-p1" class="hidden">
                <input type="text" class="input-ans" placeholder="Respuesta..." id="ans-p1" autocomplete="off">
                <button class="btn-action" style="background: var(--accent); margin-top:10px" onclick="submit('p1')">LISTO</button>
            </div>
        </div>
    </div>

    <div id="victory-screen" class="hidden">
        <h1 id="winner-text" style="font-size: 2.5rem; color: var(--accent)"></h1>
        <button class="btn-action" style="background: var(--white); color: black" onclick="location.reload()">Reiniciar</button>
    </div>

    <script>
        const letras = "ABCDEFGHJLMNOPRSTUV".split("");
        const temas = ["👤 PERSONAJE", "📍 LUGAR", "✨ SUCESO", "🍎 ALIMENTO", "📖 LIBRO", "🛠️ OBJETO"];
        let scoreP1 = 0, scoreP2 = 0, timerInterval, letraActual = "", currentPlayer = null, enRebote = false, modoActual = 'duelo';

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playNote(freq, duration) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + duration);
        }

        function toggleFS() { 
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {
                    alert("Para pantalla completa, añade la web a tu pantalla de inicio o usa Chrome/Android.");
                });
            } else { document.exitFullscreen(); }
        }

        function startGame(mode) {
            modoActual = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('score-p1').classList.remove('hidden');
            
            if(mode === 'solo') {
                document.getElementById('p2-zone').classList.add('hidden');
                document.getElementById('p1-zone').style.flex = "1";
            } else {
                document.getElementById('score-p2').classList.remove('hidden');
            }
            spin();
        }

        function spin() {
            enRebote = false; currentPlayer = null;
            document.querySelectorAll('.player-zone').forEach(z => z.classList.remove('zone-disabled', 'zone-active'));
            const display = document.getElementById('central-display');
            display.classList.add('spinning');
            resetInputs();
            let count = 0;
            const interval = setInterval(() => {
                letraActual = letras[Math.floor(Math.random() * letras.length)];
                let t = temas[Math.floor(Math.random() * temas.length)];
                document.getElementById('letra-res').innerText = letraActual;
                document.getElementById('tema-res').innerText = t;
                playNote(200 + (count * 15), 0.1);
                if(count++ > 12) { 
                    clearInterval(interval); 
                    display.classList.remove('spinning'); 
                    startTimer(100); 
                }
            }, 90);
        }

        function startTimer(speed) {
            let w = 0; const bar = document.getElementById('timer-bar');
            timerInterval = setInterval(() => {
                w += 1; bar.style.width = w + '%';
                if(w >= 100) { 
                    clearInterval(timerInterval); 
                    if(currentPlayer) handleFail(); 
                    else spin(); 
                }
            }, speed); 
        }

        function claim(p) {
            if(currentPlayer) return;
            clearInterval(timerInterval);
            currentPlayer = p;
            playNote(500, 0.2);
            
            document.getElementById(`btn-${p}`).classList.add('hidden');
            document.getElementById(`input-${p}`).classList.remove('hidden');
            document.getElementById(`${p}-zone`).classList.add('zone-active');
            
            if(modoActual === 'duelo') {
                const oponente = p === 'p1' ? 'p2' : 'p1';
                document.getElementById(`${oponente}-zone`).classList.add('zone-disabled');
            }
            
            setTimeout(() => {
                const input = document.getElementById(`ans-${p}`);
                input.focus();
                input.click();
            }, 100);

            startTimer(150); 
        }

        function submit(p) {
            const ans = document
