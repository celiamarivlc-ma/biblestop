<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Pop Pro - Plus</title>
    <style>
        :root {
            --bg: #0f172a;
            --p1: #f43f5e;
            --p2: #0ea5e9;
            --accent: #70e000;
            --white: #ffffff;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .score {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            padding: 10px 20px;
            z-index: 20;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        #score-p1 { bottom: 20px; right: 20px; color: var(--p1); }
        #score-p2 { top: 20px; left: 20px; color: var(--p2); transform: rotate(180deg); }

        #setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }

        #game-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .player-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #p1-zone { background: rgba(244, 63, 94, 0.05); border-bottom: 2px solid var(--p1); }
        #p2-zone { background: rgba(14, 165, 233, 0.05); border-top: 2px solid var(--p2); transform: rotate(180deg); }

        #central-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg);
            border: 4px solid var(--accent);
            padding: 15px;
            border-radius: 20px;
            z-index: 10;
            text-align: center;
            min-width: 240px;
            box-shadow: 0 0 25px var(--accent);
        }

        #letra-res { color: var(--accent); font-size: 4.5rem; display: block; line-height: 1; }
        #tema-res { font-size: 1rem; display: block; font-weight: bold; margin-top: 8px; text-transform: uppercase; }

        #timer-bar {
            position: absolute;
            left: 0;
            width: 0%;
            height: 8px;
            background: var(--accent);
            bottom: 0;
            transition: width 0.1s linear;
        }

        .btn-action {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .input-ans {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            margin-top: 10px;
            width: 80%;
            text-align: center;
            font-size: 1.2rem;
            background: #1e293b;
            color: white;
        }

        .hidden { display: none !important; }
        .spinning { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(-50%, -51%); } 50% { transform: translate(-50%, -49%); } }
    </style>
</head>
<body>

    <div id="score-p2" class="score hidden">0</div>
    <div id="score-p1" class="score hidden">0</div>

    <div id="setup-screen">
        <h1 style="color: var(--accent); text-align: center;">BIBLIA POP!<br><small style="font-size: 0.9rem; color: white;">NUEVOS TEMAS</small></h1>
        <button class="btn-action" style="background: var(--p1); color: white" onclick="startGame('duelo')">MODO DUELO</button>
        <button class="btn-action" style="background: var(--p2); color: white" onclick="startGame('solo')">MODO SOLITARIO</button>
    </div>

    <div id="game-screen">
        <div id="p2-zone" class="player-zone">
            <button id="btn-p2" class="btn-action" onclick="claim('p2')">¡LO TENGO!</button>
            <div id="input-p2" class="hidden">
                <input type="text" class="input-ans" placeholder="Escribe..." id="ans-p2">
                <button class="btn-action" style="background: var(--accent); margin-top:10px" onclick="submit('p2')">ENVIAR</button>
            </div>
        </div>

        <div id="central-display">
            <span id="letra-res">?</span>
            <span id="tema-res">PREPARADOS?</span>
            <div id="timer-bar"></div>
        </div>

        <div id="p1-zone" class="player-zone">
            <button id="btn-p1" class="btn-action" onclick="claim('p1')">¡LO TENGO!</button>
            <div id="input-p1" class="hidden">
                <input type="text" class="input-ans" placeholder="Escribe..." id="ans-p1">
                <button class="btn-action" style="background: var(--accent); margin-top:10px" onclick="submit('p1')">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        const letras = "ABCDEFGHJLMNOPRSTUV".split("");
        // NUEVAS CATEGORÍAS
        const temas = ["👤 PERSONAJE", "📍 LUGAR", "✨ SUCESO", "🍎 ALIMENTO", "📖 LIBRO", "🛠️ OBJETO"];
        
        let scoreP1 = 0;
        let scoreP2 = 0;
        let timerInterval;
        let letraActual = "";
        let temaActualClave = "";
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        let diccionario = JSON.parse(localStorage.getItem('bibliaDictV2')) || {
            "PERSONAJE": ["MOISES", "PEDRO", "DAVID", "ESTER", "NOE"],
            "LUGAR": ["JERUSALEN", "BELEN", "EGIPTO"],
            "LIBRO": ["GENESIS", "EXODO", "MATEO", "JUAN"],
            "SUCESO": ["RESURRECCION", "DILUVIO", "BAUTISMO", "PENTECOSTES"],
            "ALIMENTO": ["MANA", "TRIGO", "MIEL", "HIGO", "UVA", "PAN"],
            "OBJETO": ["ARCA", "HONDA", "ALTAR"]
        };

        function startGame(mode) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').style.display = 'flex';
            document.querySelectorAll('.score').forEach(s => s.classList.remove('hidden'));
            if(mode === 'solo') document.getElementById('p2-zone').style.visibility = 'hidden';
            spin();
        }

        function spin() {
            const display = document.getElementById('central-display');
            display.classList.add('spinning');
            resetInputs();
            
            let count = 0;
            const interval = setInterval(() => {
                letraActual = letras[Math.floor(Math.random() * letras.length)];
                let t = temas[Math.floor(Math.random() * temas.length)];
                document.getElementById('letra-res').innerText = letraActual;
                document.getElementById('tema-res').innerText = t;
                temaActualClave = t.split(" ")[1]; 
                playSound(300 + (count * 15), 'sine', 0.05);
                count++;
                if(count > 15) {
                    clearInterval(interval);
                    display.classList.remove('spinning');
                    playSound(700, 'triangle', 0.3);
                    startTimer();
                }
            }, 80);
        }

        function startTimer() {
            let width = 0;
            const bar = document.getElementById('timer-bar');
            timerInterval = setInterval(() => {
                width += 1;
                bar.style.width = width + '%';
                if(width >= 100) {
                    clearInterval(timerInterval);
                    playSound(100, 'sawtooth', 0.5);
                    alert("¡TIEMPO AGOTADO!");
                    spin();
                }
            }, 100); 
        }

        function claim(player) {
            clearInterval(timerInterval);
            playSound(500, 'sine', 0.2);
            document.getElementById(`btn-${player}`).classList.add('hidden');
            document.getElementById(`input-${player}`).classList.remove('hidden');
            document.getElementById(`ans-${player}`).focus();
        }

        function submit(player) {
            const input = document.getElementById(`ans-${player}`);
            const respuesta = input.value.trim().toUpperCase();

            if (!respuesta || respuesta[0] !== letraActual) {
                playSound(150, 'square', 0.3);
                alert(`¡ERROR! La respuesta debe empezar con ${letraActual}`);
                return;
            }

            let aceptada = false;
            if (diccionario[temaActualClave] && diccionario[temaActualClave].includes(respuesta)) {
                aceptada = true;
            } else {
                if (confirm(`"${respuesta}" no está en mi lista de ${temaActualClave}. ¿El grupo la acepta?`)) {
                    if(!diccionario[temaActualClave]) diccionario[temaActualClave] = [];
                    diccionario[temaActualClave].push(respuesta);
                    localStorage.setItem('bibliaDictV2', JSON.stringify(diccionario));
                    aceptada = true;
                }
            }

            if (aceptada) {
                playSound(900, 'sine', 0.4);
                if(player === 'p1') scoreP1++; else scoreP2++;
                document.getElementById('score-p1').innerText = scoreP1;
                document.getElementById('score-p2').innerText = scoreP2;
                spin();
            }
        }

        function resetInputs() {
            document.querySelectorAll('.player-zone button').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.player-zone div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('timer-bar').style.width = '0%';
        }
    </script>
</body>
</html>
