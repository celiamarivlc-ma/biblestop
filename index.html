<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIBLE STOP: RETRO EDITION</title>
    <!-- Fuente Retro de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-green: #33ff00; 
            --neon-pink: #ff00ff; 
            --neon-blue: #00ffff; 
            --bg-dark: #000000;
            --crt-overlay: rgba(18, 16, 16, 0.1);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-dark);
            color: var(--neon-green);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Efecto de líneas de TV vieja (Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Pantallas */
        #setup-screen, #victory-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-dark); z-index: 200; text-align: center;
        }

        #game-screen { display: none; flex-direction: column; height: 100%; }

        /* Zonas de Jugador */
        .player-zone {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 4px solid var(--neon-green); margin: 10px; position: relative;
            background: rgba(0, 20, 0, 0.5);
        }

        #p2-zone { transform: rotate(180deg); border-color: var(--neon-blue); color: var(--neon-blue); }
        #p1-zone { border-color: var(--neon-pink); color: var(--neon-pink); }

        /* Pantalla Central */
        #central-display {
            background: #000; border: 4px double var(--neon-green);
            padding: 15px; z-index: 10; text-align: center;
            box-shadow: 0 0 15px var(--neon-green);
        }

        #letra-res { font-size: 3rem; display: block; color: #fff; text-shadow: 0 0 10px var(--neon-green); }
        #tema-res { font-size: 0.7rem; margin-top: 10px; color: var(--neon-green); display: block; }

        /* Botones Retro */
        .btn-action {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 25px; border: 4px solid; background: transparent;
            color: inherit; cursor: pointer; font-size: 0.8rem;
            box-shadow: 4px 4px 0px; margin: 10px;
        }

        .btn-action:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px; }

        .input-ans {
            background: #000; border: 3px solid currentColor; color: #fff;
            padding: 10px; font-family: 'Press Start 2P', cursive;
            width: 80%; text-align: center; font-size: 0.8rem; outline: none;
        }

        /* Marcadores */
        .score { position: absolute; font-size: 0.8rem; padding: 10px; z-index: 50; }
        #score-p1 { bottom: 20px; right: 20px; color: var(--neon-pink); }
        #score-p2 { top: 20px; left: 20px; color: var(--neon-blue); transform: rotate(180deg); }

        .hidden { display: none !important; }
        .spinning { animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }

        /* Confetti Píxel */
        .pixel-confetti {
            position: fixed; width: 8px; height: 8px; z-index: 300; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="score-p2" class="score hidden">SCORE: 0</div>
    <div id="score-p1" class="score hidden">SCORE: 0</div>

    <!-- PANTALLA INICIO -->
    <div id="setup-screen">
        <h1 style="color: var(--neon-green); font-size: 1.5rem; margin-bottom: 40px;">
            <span style="color: white;">BIBLE</span><br>STOP
        </h1>
        <button class="btn-action" style="color: var(--neon-blue);" onclick="startGame('duelo')">INSERT COIN (1VS1)</button>
        <button class="btn-action" style="color: var(--neon-pink);" onclick="startGame('solo')">SOLO MISSION</button>
    </div>

    <!-- PANTALLA JUEGO -->
    <div id="game-screen">
        <div id="p2-zone" class="player-zone">
            <button id="btn-p2" class="btn-action" onclick="claim('p2')">STOP!</button>
            <div id="input-p2" class="hidden">
                <input type="text" class="input-ans" id="ans-p2" placeholder="TYPE...">
                <button class="btn-action" style="margin-top:10px" onclick="submit('p2')">OK</button>
            </div>
        </div>

        <div id="central-display">
            <span id="letra-res">?</span>
            <span id="tema-res">READY?</span>
        </div>

        <div id="p1-zone" class="player-zone">
            <button id="btn-p1" class="btn-action" onclick="claim('p1')">STOP!</button>
            <div id="input-p1" class="hidden">
                <input type="text" class="input-ans" id="ans-p1" placeholder="TYPE...">
                <button class="btn-action" style="margin-top:10px" onclick="submit('p1')">OK</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA VICTORIA -->
    <div id="victory-screen" class="hidden">
        <h1 id="winner-text" style="font-size: 1.2rem; color: #fff"></h1>
        <button class="btn-action" style="color: gold;" onclick="location.reload()">REPLAY</button>
    </div>

    <script>
        const letrasBase = "ABCDEFGHJLMNOPRSTUV".split("");
        const temasBase = ["PERSONAJE", "LUGAR", "SUCESO", "ALIMENTO", "LIBRO", "OBJETO", "MUJER B.", "PROFECIA"];
        
        let letrasMazo = [], temasMazo = [];
        let scoreP1 = 0, scoreP2 = 0, letraActual = "", temaClave = "", currentPlayer = null, modoActual = 'duelo';

        // Mezclador (Fisher-Yates)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return [...array];
        }

        function getNextFromMazo(tipo) {
            if (tipo === 'letra') {
                if (letrasMazo.length === 0) letrasMazo = shuffle(letrasBase);
                return letrasMazo.pop();
            } else {
                if (temasMazo.length === 0) temasMazo = shuffle(temasBase);
                return temasMazo.pop();
            }
        }

        function startGame(mode) {
            modoActual = mode;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('score-p1').classList.remove('hidden');
            
            if(mode === 'solo') {
                document.getElementById('p2-zone').style.display = 'none';
            } else {
                document.getElementById('score-p2').classList.remove('hidden');
            }
            spin();
        }

        function spin() {
            currentPlayer = null;
            resetInputs();
            const display = document.getElementById('central-display');
            display.classList.add('spinning');
            
            let count = 0;
            const interval = setInterval(() => {
                letraActual = letrasBase[Math.floor(Math.random() * letrasBase.length)];
                document.getElementById('letra-res').innerText = letraActual;
                document.getElementById('tema-res').innerText = "SCANNING...";
                
                if(count++ > 15) { 
                    clearInterval(interval); 
                    display.classList.remove('spinning');
                    letraActual = getNextFromMazo('letra');
                    temaClave = getNextFromMazo('tema');
                    document.getElementById('letra-res').innerText = letraActual;
                    document.getElementById('tema-res').innerText = "CATEGORY: " + temaClave;
                }
            }, 80);
        }

        function claim(p) {
            if(currentPlayer) return;
            currentPlayer = p;
            document.getElementById(`btn-${p}`).classList.add('hidden');
            document.getElementById(`input-${p}`).classList.remove('hidden');
            
            const input = document.getElementById(`ans-${p}`);
            setTimeout(() => input.focus(), 50);
        }

        function submit(p) {
            const val = document.getElementById(`ans-${p}`).value.trim().toUpperCase();
            if (val.startsWith(letraActual)) {
                if(p === 'p1') scoreP1 += 5; else scoreP2 += 5;
                updateScores();
                if(scoreP1 >= 25 || scoreP2 >= 25) showVictory(p); 
                else spin();
            } else {
                alert("ERROR: MUST START WITH " + letraActual);
            }
        }

        function updateScores() {
            document.getElementById('score-p1').innerText = "SCORE: " + scoreP1;
            document.getElementById('score-p2').innerText = "SCORE: " + scoreP2;
        }

        function resetInputs() {
            document.querySelectorAll('.player-zone button').forEach(b => b.classList.remove('hidden'));
            document.querySelectorAll('.player-zone div').forEach(d => d.classList.add('hidden'));
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function showVictory(p) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('victory-screen').classList.remove('hidden');
            document.getElementById('winner-text').innerText = modoActual === 'solo' ? "MISSION ACCOMPLISHED!" : "PLAYER " + (p === 'p1' ? "1" : "2") + " WINS!";
            spawnConfetti();
        }

        function spawnConfetti() {
            for(let i=0; i<50; i++) {
                const conf = document.createElement('div');
                conf.className = 'pixel-confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = ['#33ff00','#ff00ff','#00ffff'][Math.floor(Math.random()*3)];
                document.body.appendChild(conf);
                
                conf.animate([
                    { top: '-10px', transform: 'rotate(0deg)' },
                    { top: '100vh', transform: `rotate(${Math.random()*360}deg)` }
                ], { duration: 2000 + Math.random()*3000, iterations: Infinity });
            }
        }
    </script>
</body>
</html>
