<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BIBLE STOP: RETRO EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #33ff00; /* Verde fósforo */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-shadow: 2px 2px #000;
        }

        .screen {
            border: 4px solid #33ff00;
            padding: 20px;
            background: rgba(0, 20, 0, 0.9);
            box-shadow: 0 0 20px #33ff00;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        /* Efecto Scanline */
        .screen::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        h1 { color: #ff00ff; font-size: 18px; text-align: center; }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #33ff00;
            padding-bottom: 10px;
        }

        .input-group { margin: 15px 0; }
        
        label { display: block; font-size: 10px; margin-bottom: 5px; color: #00ffff; }

        input {
            background: #000;
            border: 2px solid #33ff00;
            color: #fff;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
            outline: none;
        }

        button {
            background: #ff00ff;
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            margin-top: 20px;
            box-shadow: 4px 4px 0 #800080;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #800080; }

        .celebration {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 100;
            text-align: center;
            background: #000;
            border: 5px solid gold;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="screen">
    <h1>BIBLE STOP v2.0</h1>
    
    <div class="info-bar">
        <span>LETRA: <span id="current-letter">?</span></span>
        <span>TIEMPO: <span id="timer">60</span>s</span>
    </div>

    <div id="game-fields">
        <div class="input-group">
            <label>PERSONAJE BÍBLICO</label>
            <input type="text" id="ans-1" placeholder="...">
        </div>
        <div class="input-group">
            <label>LUGAR / CIUDAD</label>
            <input type="text" id="ans-2" placeholder="...">
        </div>
        <div class="input-group">
            <label>OBJETO / ANIMAL</label>
            <input type="text" id="ans-3" placeholder="...">
        </div>
    </div>

    <button onclick="checkStop()">¡STOP!</button>
</div>

<div id="win-screen" class="celebration">
    <h2 style="color: gold;">STAAAHP!</h2>
    <p>¡NIVEL COMPLETADO!</p>
    <button onclick="resetGame()">NEXT LEVEL</button>
</div>

<script>
    const letters = "ABCDEFGHILMNOPQRSTUV".split("");
    let usedLetters = [];

    function getNewLetter() {
        if(usedLetters.length === letters.length) usedLetters = [];
        let available = letters.filter(l => !usedLetters.includes(l));
        let chosen = available[Math.floor(Math.random() * available.length)];
        usedLetters.push(chosen);
        document.getElementById('current-letter').innerText = chosen;
    }

    function checkStop() {
        // Sonido festivo (ficticio aquí)
        document.getElementById('win-screen').style.display = 'block';
        createConfetti();
    }

    function createConfetti() {
        // Lógica simple para simular confetti visual
        for(let i=0; i<30; i++) {
            let div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.width = '10px';
            div.style.height = '10px';
            div.style.backgroundColor = ['#ff0', '#f0f', '#0ff'][Math.floor(Math.random()*3)];
            div.style.left = Math.random()*100 + 'vw';
            div.style.top = '-10px';
            div.style.zIndex = '999';
            document.body.appendChild(div);
            
            let animation = div.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
            ], { duration: 2000, easing: 'linear' });
            
            animation.onfinish = () => div.remove();
        }
    }

    function resetGame() {
        document.getElementById('win-screen').style.display = 'none';
        document.querySelectorAll('input').forEach(i => i.value = "");
        getNewLetter();
    }

    // Iniciar
    getNewLetter();
</script>

</body>
</html>
